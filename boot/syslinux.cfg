# Syslinux configuration for LimboOS
DEFAULT limboos
PROMPT 0
TIMEOUT 30

LABEL limboos
    KERNEL /boot/vmlinuz
    APPEND root=/dev/ram0 rw quiet splash
    INITRD /boot/initrd.img

LABEL limboos-recovery
    KERNEL /boot/vmlinuz
    APPEND root=/dev/ram0 rw single
    INITRD /boot/initrd.img

LABEL limboos-verbose
    KERNEL /boot/vmlinuz
    APPEND root=/dev/ram0 rw verbose debug
    INITRD /boot/initrd.img
