# GRUB Configuration for LimboOS
set timeout=3
set default=0

# LimboOS boot menu
menuentry "LimboOS Linux v1.0 (Genesis)" {
    linux /boot/vmlinuz root=/dev/ram0 rw quiet splash
    initrd /boot/initrd.img
}

menuentry "LimboOS Linux (Recovery Mode)" {
    linux /boot/vmlinuz root=/dev/ram0 rw single
    initrd /boot/initrd.img
}

menuentry "LimboOS Linux (Verbose Boot)" {
    linux /boot/vmlinuz root=/dev/ram0 rw verbose debug
    initrd /boot/initrd.img
}
